name: Reserva ICD Ceuta

on:
  schedule:
    - cron: "0 5 * * 2"   # Martes 05:00
    - cron: "0 5 * * 4"   # Jueves 05:00
    - cron: "0 5 * * 6"   # Sábado 05:00
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run script
        env:
          ICD_USER: ${{ secrets.ICD_USER }}
          ICD_PASS: ${{ secrets.ICD_PASS }}
        run: python main.py
