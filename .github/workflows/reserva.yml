name: Reserva ICD Ceuta

on:
  schedule:
    - cron: "0 3 * * 2,4,6"   # Martes, jueves y sábado a las 05:00 hora española
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Run script
        env:
          ICD_USER: ${{ secrets.ICD_USER }}
          ICD_PASS: ${{ secrets.ICD_PASS }}
        run: python main.py

